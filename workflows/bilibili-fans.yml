name: Update Bilibili Fans Badge

on:
  schedule:
    - cron: "0 0 * * *"   # 每天更新一次
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch Bilibili fan count
        run: |
          curl -s "https://api.bilibili.com/x/relation/stat?vmid=255152" \
            | jq ".data.follower" > fans.txt
          
          FAN_COUNT=$(cat fans.txt)

          echo "{
            \"schemaVersion\": 1,
            \"label\": \"followers\",
            \"message\": \"${FAN_COUNT}\",
            \"color\": \"brightgreen\"
          }" > bilibili-fans.json

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add bilibili-fans.json
          git commit -m "Update Bilibili followers badge" || echo "No changes"
          git push